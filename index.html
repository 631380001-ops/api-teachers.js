<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>管理员控制台 - 老师排课管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f7fa;padding:20px;}
.container{max-width:1400px;margin:0 auto;background:white;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.1);overflow:hidden;}
.header{background:linear-gradient(135deg,#1890ff 0%,#096dd9 100%);color:white;padding:20px 30px;display:flex;justify-content:space-between;align-items:center;}
.header h1{font-size:20px;}
.header-btn{background:rgba(255,255,255,0.2);color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:14px;margin-left:10px;}
.header-btn:hover{background:rgba(255,255,255,0.3);}
.tabs{display:flex;background:#f8f9fa;border-bottom:1px solid #e8e8e8;}
.tab{padding:12px 30px;cursor:pointer;border-bottom:2px solid transparent;font-size:14px;color:#666;}
.tab:hover{background:#f0f0f0;}
.tab.active{color:#1890ff;border-bottom-color:#1890ff;background:white;}
.content{padding:20px;}
.page{display:none;}
.page.active{display:block;}
.add-form{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.add-form input{padding:10px 14px;border:1px solid #ddd;border-radius:6px;font-size:14px;}
.add-form button{padding:10px 24px;background:#1890ff;color:white;border:none;border-radius:6px;cursor:pointer;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{padding:10px;border:1px solid #eee;text-align:left;}
th{background:#fafafa;font-weight:600;}
.pwd{background:#f5f5f5;padding:4px 8px;border-radius:4px;font-family:monospace;}
.btn-sm{padding:4px 12px;font-size:12px;margin-right:5px;border:none;border-radius:4px;cursor:pointer;}
.reset{background:#52c41a;color:white;}
.del{background:#ff4d4f;color:white;}
.tip{background:#e6f7ff;padding:12px;border-radius:6px;margin-bottom:20px;color:#0050b3;}
.controls{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap;align-items:center;}
.controls select,.controls input{padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;}
.view-tabs{display:flex;gap:5px;margin-bottom:15px;}
.view-tabs button{padding:8px 16px;background:#f0f0f0;border:none;border-radius:6px;cursor:pointer;font-size:13px;}
.view-tabs button.active{background:#1890ff;color:white;}
.cell-available{background:#52c41a;color:white;text-align:center;cursor:pointer;}
.cell-scheduled{background:#ff4d4f;color:white;text-align:center;cursor:pointer;}
.cell-empty{background:#f5f5f5;text-align:center;cursor:pointer;}
.stats{display:flex;gap:15px;margin-bottom:15px;flex-wrap:wrap;}
.stat-card{background:#fafafa;padding:12px 20px;border-radius:8px;flex:1;min-width:120px;}
.stat-card h3{font-size:12px;color:#999;margin-bottom:5px;}
.stat-card .num{font-size:20px;font-weight:600;color:#333;}
.export-btn{background:#52c41a!important;color:white;}
.loading{text-align:center;padding:40px;color:#999;}
.legend{display:flex;gap:20px;margin-bottom:15px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:13px;color:#666;}
.legend-color{width:16px;height:16px;border-radius:3px;}
.legend-color.green{background:#52c41a;}
.legend-color.red{background:#ff4d4f;}
.legend-color.gray{background:#f0f0f0;border:1px solid #ddd;}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🔐 管理员控制台</h1>
<div>
<button class="header-btn export-btn" onclick="exportCSV()">📥 导出CSV</button>
<button class="header-btn" onclick="refreshAll()">🔄 刷新数据</button>
</div>
</div>
<div class="tabs">
<div class="tab active" onclick="switchTab('manage')">📋 老师管理</div>
<div class="tab" onclick="switchTab('view')">📊 排课查看</div>
</div>
<div class="content">
<div id="managePage" class="page active">
<div class="tip">💡 初始密码 = 手机号后6位 | 数据存储在飞书多维表格</div>
<div class="add-form">
<input type="text" id="name" placeholder="老师姓名" style="width:150px;">
<input type="text" id="phone" placeholder="手机号(11位)" style="width:180px;">
<button onclick="addTeacher()">添加老师</button>
</div>
<div id="manageStatus" class="loading">正在连接飞书...</div>
<table id="teacherTable" style="display:none;">
<tr><th>老师姓名</th><th>手机号</th><th>密码</th><th>状态</th><th>操作</th></tr>
<tbody id="teacherList"></tbody>
</table>
</div>
<div id="viewPage" class="page">
<div class="view-tabs">
<button class="active" onclick="switchView('date')">按日期</button>
<button onclick="switchView('teacher')">按老师</button>
<button onclick="switchView('week')">按周汇总</button>
</div>
<div class="legend">
<div class="legend-item"><div class="legend-color gray"></div><span>不可排课</span></div>
<div class="legend-item"><div class="legend-color green"></div><span>可排课</span></div>
<div class="legend-item"><div class="legend-color red"></div><span>已排课</span></div>
</div>
<div class="controls">
<div id="dateControls">
<label>选择日期：</label>
<input type="date" id="selectedDate" onchange="loadViewData()">
</div>
<div id="teacherControls" style="display:none;">
<label>选择老师：</label>
<select id="selectedTeacher" onchange="loadViewData()"><option value="">请选择</option></select>
<select id="selectedWeek" onchange="loadViewData()"></select>
</div>
<div id="weekControls" style="display:none;">
<label>选择周次：</label>
<select id="weekSelect" onchange="loadViewData()"></select>
</div>
</div>
<div id="stats" class="stats"></div>
<div id="viewStatus" class="loading">正在加载数据...</div>
<div id="scheduleTable" style="overflow-x:auto;"></div>
</div>
</div>
</div>
<script>
const API_BASE = window.location.origin;
const timeSlots=[];
for(let h=8;h<22;h++){
  timeSlots.push(h.toString().padStart(2,'0')+":00-"+h.toString().padStart(2,'0')+":30");
  timeSlots.push(h.toString().padStart(2,'0')+":30-"+(h+1).toString().padStart(2,'0')+":00");
}
let teachers=[],allRecords=[],currentView='date';
document.addEventListener('DOMContentLoaded',async()=>{
  const today=new Date();
  document.getElementById('selectedDate').value=formatDateInput(today);
  await Promise.all([loadTeachersFromAPI(),loadAllRecords()]);
  initWeekSelect();
  loadViewData();
});
async function loadTeachersFromAPI(){
  try{
    const r=await fetch(API_BASE+'/api/teachers');
    const d=await r.json();
    if(d.code===0){
      const list=document.getElementById('teacherList');
      list.innerHTML='';
      teachers=[];
      d.data.items.forEach(item=>{
        const name=item.fields['老师姓名']||'';
        const phone=item.fields['手机号']||'';
        const pwd=item.fields['密码']||'';
        const isInit=pwd===phone.slice(-6);
        if(name)teachers.push(name);
        list.innerHTML+="<tr><td><strong>"+name+"</strong></td><td>"+phone+"</td><td class='pwd'>"+pwd+"</td><td>"+(isInit?"<span style='color:#999'>初始密码</span>":"<span style='color:#52c41a'>已修改</span>")+"</td><td><button class='btn-sm reset' onclick=\"resetPwd('"+item.record_id+"','"+phone+"')\">重置密码</button><button class='btn-sm del' onclick=\"delTeacher('"+item.record_id+"')\">删除</button></td></tr>";
      });
      document.getElementById('manageStatus').style.display='none';
      document.getElementById('teacherTable').style.display='table';
      const sel=document.getElementById('selectedTeacher');
      sel.innerHTML="<option value=''>请选择老师</option>";
      teachers.forEach(t=>sel.innerHTML+="<option value='"+t+"'>"+t+"</option>");
    }
  }catch(e){document.getElementById('manageStatus').textContent='连接失败：'+e.message;}
}
async function loadAllRecords(){
  try{
    const r=await fetch(API_BASE+'/api/schedule');
    const d=await r.json();
    if(d.code===0){
      allRecords=d.data.items.map(item=>({
        teacher:item.fields['老师姓名'],
        date:item.fields['日期'],
        slot:item.fields['时段'],
        status:item.fields['状态']||'可排课'
      }));
      document.getElementById('viewStatus').style.display='none';
    }
  }catch(e){}
}
function initWeekSelect(){
  const today=new Date();
  const sel=document.getElementById('weekSelect');
  const sel2=document.getElementById('selectedWeek');
  sel.innerHTML='';
  sel2.innerHTML='';
  for(let i=-4;i<=4;i++){
    const monday=getMonday(today);
    monday.setDate(monday.getDate()+i*7);
    const end=new Date(monday);
    end.setDate(end.getDate()+6);
    const label=(monday.getMonth()+1)+"/"+monday.getDate()+" - "+(end.getMonth()+1)+"/"+end.getDate();
    const val=monday.toISOString().split('T')[0];
    sel.innerHTML+="<option value='"+val+"'>"+label+"</option>";
    sel2.innerHTML+="<option value='"+val+"'>"+label+"</option>";
  }
}
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelector(".tab[onclick=\"switchTab('"+tab+"')\"]").classList.add('active');
  document.getElementById(tab+'Page').classList.add('active');
  if(tab==='view')loadViewData();
}
function switchView(view){
  currentView=view;
  document.querySelectorAll('.view-tabs button').forEach(btn=>btn.classList.remove('active'));
  document.querySelector(".view-tabs button[onclick=\"switchView('"+view+"')\"]").classList.add('active');
  document.getElementById('dateControls').style.display=view==='date'?'inline-flex':'none';
  document.getElementById('teacherControls').style.display=view==='teacher'?'inline-flex':'none';
  document.getElementById('weekControls').style.display=view==='week'?'inline-flex':'none';
  loadViewData();
}
async function addTeacher(){
  const name=document.getElementById('name').value.trim();
  const phone=document.getElementById('phone').value.trim();
  if(!name)return alert('请输入老师姓名');
  if(phone.length!==11)return alert('请输入正确的11位手机号');
  const pwd=phone.slice(-6);
  try{
    const r=await fetch(API_BASE+'/api/teacher-manage',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,phone,password:pwd})
    });
    const d=await r.json();
    if(d.code===0){
      alert('添加成功！初始密码：'+pwd);
      document.getElementById('name').value='';
      document.getElementById('phone').value='';
      loadTeachersFromAPI();
    }else{
      alert('添加失败：'+d.msg);
    }
  }catch(e){
    alert('网络错误：'+e.message);
  }
}
async function resetPwd(recordId,phone){
  const newPwd=phone.slice(-6);
  try{
    const r=await fetch(API_BASE+'/api/teacher-manage',{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({recordId,password:newPwd})
    });
    const d=await r.json();
    if(d.code===0){
      alert('密码已重置为：'+newPwd);
      loadTeachersFromAPI();
    }else{
      alert('重置失败：'+d.msg);
    }
  }catch(e){
    alert('网络错误：'+e.message);
  }
}
async function delTeacher(recordId){
  if(!confirm('确定删除这位老师？'))return;
  try{
    const r=await fetch(API_BASE+'/api/teacher-manage',{
      method:'DELETE',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({recordId})
    });
    const d=await r.json();
    if(d.code===0){
      alert('删除成功');
      loadTeachersFromAPI();
    }else{
      alert('删除失败：'+d.msg);
    }
  }catch(e){
    alert('网络错误：'+e.message);
  }
}
function loadViewData(){
  if(currentView==='date')loadByDate();
  else if(currentView==='teacher')loadByTeacher();
  else loadByWeek();
}
function loadByDate(){
  const date=document.getElementById('selectedDate').value;
  const records=allRecords.filter(r=>r.date===date);
  const container=document.getElementById('scheduleTable');
  let html="<table><tr><th>时段</th>";
  teachers.forEach(t=>html+="<th>"+t+"</th>");
  html+="</tr>";
  const teacherSlots={};
  records.forEach(r=>{
    const key=r.teacher+'-'+r.slot;
    teacherSlots[key]=r.status;
  });
  timeSlots.forEach(slot=>{
    html+="<tr><td>"+slot+"</td>";
    teachers.forEach(t=>{
      const key=t+'-'+slot;
      const status=teacherSlots[key];
      let cellClass='cell-empty';
      let cellText='';
      if(status==='可排课'){
        cellClass='cell-available';
        cellText='✓';
      }else if(status==='已排课'){
        cellClass='cell-scheduled';
        cellText='✓';
      }
      html+="<td class='"+cellClass+"' onclick=\"toggleCell('"+t+"','"+date+"','"+slot+"','"+status+"')\">"+cellText+"</td>";
    });
    html+="</tr>";
  });
  html+="</table>";
  container.innerHTML=html;
  const availableCount=records.filter(r=>r.status==='可排课').length;
  const scheduledCount=records.filter(r=>r.status==='已排课').length;
  const totalTeachers=new Set(records.map(r=>r.teacher)).size;
  document.getElementById('stats').innerHTML="<div class='stat-card'><h3>日期</h3><div class='num'>"+date+"</div></div><div class='stat-card'><h3>可排课时段</h3><div class='num' style='color:#52c41a'>"+availableCount+"</div></div><div class='stat-card'><h3>已排课时段</h3><div class='num' style='color:#ff4d4f'>"+scheduledCount+"</div></div><div class='stat-card'><h3>填报老师数</h3><div class='num'>"+totalTeachers+"</div></div>";
}
function loadByTeacher(){
  const teacher=document.getElementById('selectedTeacher').value;
  const weekStart=document.getElementById('selectedWeek').value;
  if(!teacher){
    document.getElementById('scheduleTable').innerHTML="<p style='color:#999;padding:20px;'>请选择老师</p>";
    return;
  }
  const ws=new Date(weekStart);
  const we=new Date(ws);
  we.setDate(we.getDate()+7);
  const records=allRecords.filter(r=>{
    if(r.teacher!==teacher)return false;
    const d=new Date(r.date);
    return d>=ws&&d<we;
  });
  const container=document.getElementById('scheduleTable');
  const days=['周一','周二','周三','周四','周五','周六','周日'];
  let html="<table><tr><th>时段</th>";
  days.forEach(d=>html+="<th>"+d+"</th>");
  html+="</tr>";
  const daySlots={};
  records.forEach(r=>{
    const d=new Date(r.date);
    const dayIdx=Math.floor((d-ws)/(1000*60*60*24));
    if(dayIdx>=0&&dayIdx<7){
      const key=dayIdx+'-'+r.slot;
      daySlots[key]=r.status;
    }
  });
  timeSlots.forEach(slot=>{
    html+="<tr><td>"+slot+"</td>";
    for(let d=0;d<7;d++){
      const key=d+'-'+slot;
      const status=daySlots[key];
      let cellClass='cell-empty';
      let cellText='';
      if(status==='可排课'){
        cellClass='cell-available';
        cellText='✓';
      }else if(status==='已排课'){
        cellClass='cell-scheduled';
        cellText='✓';
      }
      const cellDate=new Date(ws);
      cellDate.setDate(cellDate.getDate()+d);
      html+="<td class='"+cellClass+"' onclick=\"toggleCell('"+teacher+"','"+cellDate.toISOString().split('T')[0]+"','"+slot+"','"+status+"')\">"+cellText+"</td>";
    }
    html+="</tr>";
  });
  html+="</table>";
  container.innerHTML=html;
  const availableCount=records.filter(r=>r.status==='可排课').length;
  const scheduledCount=records.filter(r=>r.status==='已排课').length;
  document.getElementById('stats').innerHTML="<div class='stat-card'><h3>老师</h3><div class='num'>"+teacher+"</div></div><div class='stat-card'><h3>可排课时段</h3><div class='num' style='color:#52c41a'>"+availableCount+"</div></div><div class='stat-card'><h3>已排课时段</h3><div class='num' style='color:#ff4d4f'>"+scheduledCount+"</div></div>";
}
function loadByWeek(){
  const weekStart=document.getElementById('weekSelect').value;
  const ws=new Date(weekStart);
  const we=new Date(ws);
  we.setDate(we.getDate()+7);
  const records=allRecords.filter(r=>{
    const d=new Date(r.date);
    return d>=ws&&d<we;
  });
  const container=document.getElementById('scheduleTable');
  const days=['周一','周二','周三','周四','周五','周六','周日'];
  let html="<table><tr><th>老师</th>";
  days.forEach(d=>html+="<th>"+d+"</th>");
  html+="<th>可排课</th><th>已排课</th></tr>";
  const teacherCounts={};
  records.forEach(r=>{
    const t=r.teacher;
    if(!teacherCounts[t])teacherCounts[t]={available:[0,0,0,0,0,0,0],scheduled:[0,0,0,0,0,0,0]};
    const d=new Date(r.date);
    const dayIdx=Math.floor((d-ws)/(1000*60*60*24));
    if(dayIdx>=0&&dayIdx<7){
      if(r.status==='已排课'){
        teacherCounts[t].scheduled[dayIdx]++;
      }else{
        teacherCounts[t].available[dayIdx]++;
      }
    }
  });
  teachers.forEach(t=>{
    const counts=teacherCounts[t]||{available:[0,0,0,0,0,0,0],scheduled:[0,0,0,0,0,0,0]};
    const totalAvailable=counts.available.reduce((a,b)=>a+b,0);
    const totalScheduled=counts.scheduled.reduce((a,b)=>a+b,0);
    html+="<tr><td><strong>"+t+"</strong></td>";
    for(let d=0;d<7;d++){
      const avail=counts.available[d];
      const sched=counts.scheduled[d];
      let cellText=avail+sched;
      let cellClass='cell-empty';
      if(sched>0){
        cellClass='cell-scheduled';
      }else if(avail>0){
        cellClass='cell-available';
      }
      html+="<td class='"+cellClass+"'>"+cellText+"</td>";
    }
    html+="<td style='color:#52c41a'><strong>"+totalAvailable+"</strong></td>";
    html+="<td style='color:#ff4d4f'><strong>"+totalScheduled+"</strong></td></tr>";
  });
  html+="</table>";
  container.innerHTML=html;
  const totalAvailable=records.filter(r=>r.status==='可排课').length;
  const totalScheduled=records.filter(r=>r.status==='已排课').length;
  const totalTeachers=new Set(records.map(r=>r.teacher)).size;
  document.getElementById('stats').innerHTML="<div class='stat-card'><h3>本周日期</h3><div class='num'>"+weekStart+"</div></div><div class='stat-card'><h3>可排课时段</h3><div class='num' style='color:#52c41a'>"+totalAvailable+"</div></div><div class='stat-card'><h3>已排课时段</h3><div class='num' style='color:#ff4d4f'>"+totalScheduled+"</div></div><div class='stat-card'><h3>填报老师数</h3><div class='num'>"+totalTeachers+"</div></div>";
}
async function toggleCell(teacher,date,slot,currentStatus){
  let newStatus='';
  if(!currentStatus){
    newStatus='可排课';
  }else if(currentStatus==='可排课'){
    newStatus='已排课';
  }else{
    newStatus='';
  }
  try{
    const r=await fetch(API_BASE+'/api/schedule',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        teacher:teacher,
        records:newStatus?[{fields:{'老师姓名':teacher,'日期':date,'时段':slot,'状态':newStatus}}]:[]
      })
    });
    const d=await r.json();
    if(d.code===0){
      await loadAllRecords();
      loadViewData();
    }else{
      alert('操作失败：'+d.msg);
    }
  }catch(e){
    alert('网络错误：'+e.message);
  }
}
async function refreshAll(){
  document.getElementById('manageStatus').style.display='block';
  document.getElementById('manageStatus').textContent='正在刷新...';
  document.getElementById('viewStatus').style.display='block';
  await Promise.all([loadTeachersFromAPI(),loadAllRecords()]);
  loadViewData();
}
function exportCSV(){
  let csv='\uFEFF';
  const table=document.querySelector('#scheduleTable table');
  if(!table)return alert('当前没有数据可导出');
  const rows=table.querySelectorAll('tr');
  rows.forEach(row=>{
    const cols=row.querySelectorAll('th,td');
    const data=Array.from(cols).map(c=>'"'+c.textContent.trim()+'"');
    csv+=data.join(',')+'\n';
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='排课时间_'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
}
function getMonday(d){const n=new Date(d),day=n.getDay();n.setDate(n.getDate()-(day===0?6:day-1));return n;}
function formatDateInput(d){return d.getFullYear()+"-"+(d.getMonth()+1).toString().padStart(2,'0')+"-"+d.getDate().toString().padStart(2,'0');}
</script>
</body>
</html>
