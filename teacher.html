<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老师可排课时间填报</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f7fa;padding:20px;}
.container{max-width:1200px;margin:0 auto;background:white;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.1);overflow:hidden;}
.login-page{padding:60px 40px;text-align:center;}
.login-page h1{font-size:24px;color:#333;margin-bottom:30px;}
.login-form{max-width:320px;margin:0 auto;}
.login-form select,.login-form input{width:100%;padding:12px 16px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:15px;}
.login-form button{width:100%;padding:12px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;}
.login-error{color:#ff4d4f;font-size:13px;margin-top:10px;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center;}
.modal.show{display:flex;}
.modal-content{background:white;padding:30px;border-radius:12px;width:320px;}
.modal-content h3{margin-bottom:20px;font-size:18px;}
.modal-content input{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:6px;margin-bottom:12px;font-size:14px;}
.modal-buttons{display:flex;gap:10px;margin-top:15px;}
.modal-buttons button{flex:1;padding:10px;border:none;border-radius:6px;cursor:pointer;font-size:14px;}
.modal-buttons .confirm{background:#667eea;color:white;}
.modal-buttons .cancel{background:#f0f0f0;}
.main-page{display:none;}
.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:20px 30px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.header h1{font-size:20px;font-weight:600;}
.header-right{display:flex;align-items:center;gap:12px;}
.current-teacher{background:rgba(255,255,255,0.2);padding:8px 16px;border-radius:6px;font-size:14px;}
.header-btn{background:rgba(255,255,255,0.2);color:white;border:none;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:13px;}
.submit-btn{background:white;color:#667eea;border:none;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;}
.week-nav{display:flex;justify-content:center;align-items:center;padding:15px 20px;background:#f8f9fa;gap:15px;flex-wrap:wrap;}
.week-nav button{background:white;border:1px solid #ddd;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:14px;}
.week-nav span{font-size:16px;font-weight:600;color:#333;}
.quick-actions{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap;}
.quick-btn{background:#e8f4fd;color:#1890ff;border:1px solid #91d5ff;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;}
.quick-btn.warning{background:#fffbe6;color:#faad14;border-color:#ffe58f;}
.quick-btn.danger{background:#fff1f0;color:#ff4d4f;border-color:#ffa39e;}
.schedule-grid{padding:15px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #e8e8e8;padding:0;text-align:center;font-size:12px;}
th{background:#fafafa;font-weight:600;color:#333;position:sticky;top:0;padding:6px 4px;}
th:first-child{background:#667eea;color:white;position:sticky;left:0;z-index:10;min-width:85px;}
td:first-child{background:#fafafa;font-weight:500;color:#666;position:sticky;left:0;padding:6px 4px;}
.time-slot{display:flex;align-items:center;justify-content:center;cursor:pointer;height:30px;transition:all 0.1s;}
.time-slot:hover{background:#e8f4fd;}
.time-slot.available{background:#52c41a;color:white;}
.time-slot.scheduled{background:#ff4d4f;color:white;}
.time-slot.selecting{background:#1890ff!important;color:white;}
.time-slot.deselecting{background:#ff4d4f!important;color:white;}
.day-header{position:relative;padding-bottom:24px!important;}
.day-actions{position:absolute;bottom:2px;left:0;right:0;display:flex;justify-content:center;gap:4px;}
.day-action-btn{font-size:10px;padding:1px 6px;border:none;border-radius:3px;cursor:pointer;background:#e8e8e8;color:#666;}
.day-action-btn.select-all:hover{background:#b7eb8f;color:#389e0d;}
.day-action-btn.deselect-all:hover{background:#ffa39e;color:#cf1322;}
.time-group{background:#e6e6fa;color:#5a5a8a;font-weight:600;padding:8px 4px;}
.time-group td:first-child{background:#e6e6fa;}
.legend{display:flex;justify-content:center;gap:20px;padding:12px;background:#f8f9fa;border-top:1px solid #e8e8e8;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:8px;font-size:13px;color:#666;}
.legend-color{width:20px;height:20px;border-radius:4px;}
.legend-color.green{background:#52c41a;}
.legend-color.red{background:#ff4d4f;}
.legend-color.gray{background:#f0f0f0;border:1px solid #ddd;}
.toast{position:fixed;top:20px;right:20px;background:#52c41a;color:white;padding:15px 25px;border-radius:8px;transform:translateX(150%);transition:transform 0.3s;z-index:1001;}
.toast.show{transform:translateX(0);}
.toast.error{background:#ff4d4f;}
.tip{background:#e6f7ff;border:1px solid #91d5ff;padding:10px 15px;margin:0 15px;border-radius:6px;font-size:13px;color:#0050b3;}
.loading{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.9);display:none;justify-content:center;align-items:center;z-index:2000;}
</style>
</head>
<body>
<div class="loading" id="loading"><div>⏳ 加载中...</div></div>
<div class="container">
<div class="login-page" id="loginPage">
<h1>📅 老师可排课时间填报</h1>
<div class="login-form">
<select id="loginTeacher"><option value="">请选择老师</option></select>
<input type="password" id="loginPassword" placeholder="请输入密码（初始为手机号后6位）">
<button onclick="login()">登 录</button>
<div class="login-error" id="loginError"></div>
</div>
</div>
<div class="main-page" id="mainPage">
<div class="header">
<h1>📅 老师可排课时间填报</h1>
<div class="header-right">
<span class="current-teacher" id="currentTeacherDisplay"></span>
<button class="header-btn" onclick="showChangePassword()">🔒 修改密码</button>
<button class="header-btn" onclick="logout()">退出</button>
<button class="submit-btn" onclick="submitData()">💾 保存</button>
</div>
</div>
<div class="week-nav">
<button onclick="changeWeek(-1)">◀ 上周</button>
<span id="weekDisplay"></span>
<button onclick="changeWeek(1)">下周 ▶</button>
<div class="quick-actions">
<button class="quick-btn warning" onclick="copyFromLastWeek()">📋 复制上周</button>
<button class="quick-btn danger" onclick="clearWeek()">✗ 清空本周</button>
</div>
</div>
<div class="tip">💡 提示：点击切换状态 → 空白 → 绿色(可排课) → 红色(已排课) → 空白 | 支持拖拽批量选择</div>
<div class="schedule-grid">
<table>
<thead>
<tr>
<th>时段</th>
<th class="day-header">周一<br><span class="date-label"></span><div class="day-actions"><button class="day-action-btn select-all" onclick="selectDay(0,'available')">全选</button><button class="day-action-btn deselect-all" onclick="deselectDay(0)">取消</button></div></th>
<th class="day-header">周二<br><span class="date-label"></span><div class="day-actions"><button class="day-action-btn select-all" onclick="selectDay(1,'available')">全选</button><button class="day-action-btn deselect-all" onclick="deselectDay(1)">取消</button></div></th>
<th class="day-header">周三<br><span class="date-label"></span><div class="day-actions"><button class="day-action-btn select-all" onclick="selectDay(2,'available')">全选</button><button class="day-action-btn deselect-all" onclick="deselectDay(2)">取消</button></div></th>
<th class="day-header">周四<br><span class="date-label"></span><div class="day-actions"><button class="day-action-btn select-all" onclick="selectDay(3,'available')">全选</button><button class="day-action-btn deselect-all" onclick="deselectDay(3)">取消</button></div></th>
<th class="day-header">周五<br><span class="date-label"></span><div class="day-actions"><button class="day-action-btn select-all" onclick="selectDay(4,'available')">全选</button><button class="day-action-btn deselect-all" onclick="deselectDay(4)">取消</button></div></th>
<th class="day-header">周六<br><span class="date-label"></span><div class="day-actions"><button class="day-action-btn select-all" onclick="selectDay(5,'available')">全选</button><button class="day-action-btn deselect-all" onclick="deselectDay(5)">取消</button></div></th>
<th class="day-header">周日<br><span class="date-label"></span><div class="day-actions"><button class="day-action-btn select-all" onclick="selectDay(6,'available')">全选</button><button class="day-action-btn deselect-all" onclick="deselectDay(6)">取消</button></div></th>
</tr>
</thead>
<tbody id="scheduleBody"></tbody>
</table>
</div>
<div class="legend">
<div class="legend-item"><div class="legend-color gray"></div><span>不可排课</span></div>
<div class="legend-item"><div class="legend-color green"></div><span>可排课</span></div>
<div class="legend-item"><div class="legend-color red"></div><span>已排课</span></div>
</div>
</div>
</div>
<div class="modal" id="passwordModal">
<div class="modal-content">
<h3>🔒 修改密码</h3>
<input type="password" id="oldPassword" placeholder="原密码">
<input type="password" id="newPassword" placeholder="新密码（6位以上）">
<input type="password" id="confirmPassword" placeholder="确认新密码">
<div class="modal-buttons">
<button class="cancel" onclick="hideChangePassword()">取消</button>
<button class="confirm" onclick="changePassword()">确认修改</button>
</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
const API_BASE = window.location.origin;
const timeSlots=[];
for(let h=8;h<22;h++){
  timeSlots.push(h.toString().padStart(2,'0')+":00-"+h.toString().padStart(2,'0')+":30");
  timeSlots.push(h.toString().padStart(2,'0')+":30-"+(h+1).toString().padStart(2,'0')+":00");
}
const timeGroups=[
  {name:"☀️ 上午",start:0,end:7},
  {name:"🌤️ 下午",start:8,end:19},
  {name:"🌙 晚上",start:20,end:27}
];
let currentTeacher=null,currentWeekStart=getMonday(new Date());
let teachersData={},currentTeacherRecordId=null;
let isDragging=false,dragMode=null,draggedSlots=new Set();
let lastWeekSlots={};
document.addEventListener('DOMContentLoaded',async()=>{
  await loadTeachersFromAPI();
  renderSchedule();
  updateWeekDisplay();
});
async function loadTeachersFromAPI(){
  try{
    const r=await fetch(API_BASE+'/api/teachers');
    const d=await r.json();
    if(d.code===0){
      const sel=document.getElementById('loginTeacher');
      sel.innerHTML='<option value="">请选择老师</option>';
      d.data.items.forEach(item=>{
        const name=item.fields['老师姓名'];
        const pwd=item.fields['密码'];
        if(name&&pwd){
          teachersData[name]={password:pwd,recordId:item.record_id};
          sel.innerHTML+="<option value='"+name+"'>"+name+"</option>";
        }
      });
    }
  }catch(e){}
}
function login(){
  const t=document.getElementById('loginTeacher').value;
  const p=document.getElementById('loginPassword').value;
  if(!t)return document.getElementById('loginError').textContent='请选择老师';
  if(!p)return document.getElementById('loginError').textContent='请输入密码';
  if(!teachersData[t]||teachersData[t].password!==p)return document.getElementById('loginError').textContent='密码错误';
  currentTeacher=t;
  currentTeacherRecordId=teachersData[t].recordId;
  document.getElementById('loginError').textContent='';
  showMainPage();
}
function logout(){
  currentTeacher=null;
  currentTeacherRecordId=null;
  document.getElementById('loginPage').style.display='block';
  document.getElementById('mainPage').style.display='none';
  document.getElementById('loginPassword').value='';
}
function showChangePassword(){
  document.getElementById('passwordModal').classList.add('show');
  document.getElementById('oldPassword').value='';
  document.getElementById('newPassword').value='';
  document.getElementById('confirmPassword').value='';
}
function hideChangePassword(){
  document.getElementById('passwordModal').classList.remove('show');
}
async function changePassword(){
  const oldPwd=document.getElementById('oldPassword').value;
  const newPwd=document.getElementById('newPassword').value;
  const confirmPwd=document.getElementById('confirmPassword').value;
  if(oldPwd!==teachersData[currentTeacher].password)return showToast('原密码错误',true);
  if(newPwd.length<6)return showToast('新密码需要6位以上',true);
  if(newPwd!==confirmPwd)return showToast('两次输入的新密码不一致',true);
  try{
    const r=await fetch(API_BASE+'/api/teacher-manage',{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({recordId:currentTeacherRecordId,password:newPwd})
    });
    const d=await r.json();
    if(d.code===0){
      teachersData[currentTeacher].password=newPwd;
      hideChangePassword();
      showToast('密码修改成功！');
    }else{
      showToast('修改失败：'+d.msg,true);
    }
  }catch(e){
    showToast('网络错误',true);
  }
}
async function showMainPage(){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('mainPage').style.display='block';
  document.getElementById('currentTeacherDisplay').textContent='👤 '+currentTeacher;
  await loadSavedData();
}
async function loadSavedData(){
  showLoading(true);
  try{
    const r=await fetch(API_BASE+'/api/schedule?teacher='+encodeURIComponent(currentTeacher));
    const d=await r.json();
    document.querySelectorAll('.time-slot').forEach(el=>{
      el.classList.remove('available','scheduled');
    });
    lastWeekSlots={};
    if(d.code===0&&d.data.items.length>0){
      d.data.items.forEach(item=>{
        const date=item.fields['日期'];
        const slot=item.fields['时段'];
        const status=item.fields['状态']||'可排课';
        const dayIdx=getDayIndex(date);
        const slotIdx=timeSlots.indexOf(slot);
        if(dayIdx>=0&&slotIdx>=0){
          const el=document.querySelector(".time-slot[data-day='"+dayIdx+"'][data-slot='"+slotIdx+"']");
          if(el){
            if(status==='已排课'){
              el.classList.add('scheduled');
            }else{
              el.classList.add('available');
            }
          }
        }
        const lastWeekStart=new Date(currentWeekStart);
        lastWeekStart.setDate(lastWeekStart.getDate()-7);
        const lastWeekEnd=new Date(lastWeekStart);
        lastWeekEnd.setDate(lastWeekEnd.getDate()+7);
        let dVal=typeof date==='number'?new Date(date):new Date(date);
        if(dVal>=lastWeekStart&&dVal<lastWeekEnd){
          const dIdx=Math.floor((dVal-lastWeekStart)/(1000*60*60*24));
          if(dIdx>=0&&dIdx<7){
            lastWeekSlots[dIdx+'-'+slotIdx]=status;
          }
        }
      });
    }
  }catch(e){}
  showLoading(false);
}
function getDayIndex(dateVal){
  let d;
  if(typeof dateVal==='number'){
    d=new Date(dateVal);
  }else{
    d=new Date(dateVal);
  }
  const weekStart=new Date(currentWeekStart);
  for(let i=0;i<7;i++){
    const dd=new Date(weekStart);
    dd.setDate(dd.getDate()+i);
    if(d.getFullYear()===dd.getFullYear()&&d.getMonth()===dd.getMonth()&&d.getDate()===dd.getDate())return i;
  }
  return -1;
}
async function submitData(){
  showLoading(true);
  const records=[];
  document.querySelectorAll('.time-slot.available').forEach(el=>{
    const day=parseInt(el.dataset.day);
    const slotIdx=parseInt(el.dataset.slot);
    const date=new Date(currentWeekStart);
    date.setDate(date.getDate()+day);
    records.push({fields:{'老师姓名':currentTeacher,'日期':formatFullDate(date),'时段':timeSlots[slotIdx],'状态':'可排课'}});
  });
  document.querySelectorAll('.time-slot.scheduled').forEach(el=>{
    const day=parseInt(el.dataset.day);
    const slotIdx=parseInt(el.dataset.slot);
    const date=new Date(currentWeekStart);
    date.setDate(date.getDate()+day);
    records.push({fields:{'老师姓名':currentTeacher,'日期':formatFullDate(date),'时段':timeSlots[slotIdx],'状态':'已排课'}});
  });
  try{
    const r=await fetch(API_BASE+'/api/schedule',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({teacher:currentTeacher,records})
    });
    const d=await r.json();
    if(d.code===0){
      showToast('保存成功！');
    }else{
      showToast('保存失败：'+d.msg,true);
    }
  }catch(e){
    showToast('网络错误',true);
  }
  showLoading(false);
}
function getMonday(d){const n=new Date(d),day=n.getDay();n.setDate(n.getDate()-(day===0?6:day-1));return n;}
function formatDate(d){return(d.getMonth()+1)+"/"+d.getDate();}
function formatFullDate(d){return d.getTime();}
function updateWeekDisplay(){
  const end=new Date(currentWeekStart);
  end.setDate(end.getDate()+6);
  document.getElementById('weekDisplay').textContent=currentWeekStart.getFullYear()+"年"+(currentWeekStart.getMonth()+1)+"月"+currentWeekStart.getDate()+"日 ~ "+(end.getMonth()+1)+"月"+end.getDate()+"日";
  document.querySelectorAll('.date-label').forEach((el,i)=>{
    const d=new Date(currentWeekStart);
    d.setDate(d.getDate()+i);
    el.textContent="("+formatDate(d)+")";
  });
}
function changeWeek(delta){
  currentWeekStart.setDate(currentWeekStart.getDate()+delta*7);
  updateWeekDisplay();
  loadSavedData();
}
function showLoading(s){document.getElementById('loading').style.display=s?'flex':'none';}
function showToast(msg,isErr=false){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast '+(isErr?'error':'')+' show';
  setTimeout(()=>t.classList.remove('show'),2500);
}
function renderSchedule(){
  const tb=document.getElementById('scheduleBody');
  tb.innerHTML='';
  timeGroups.forEach(group=>{
    const groupTr=document.createElement('tr');
    groupTr.className='time-group';
    groupTr.innerHTML='<td colspan="8">'+group.name+'</td>';
    tb.appendChild(groupTr);
    for(let si=group.start;si<=group.end;si++){
      const tr=document.createElement('tr');
      tr.innerHTML="<td>"+timeSlots[si]+"</td>"+Array(7).fill(0).map((_,d)=>"<td><div class='time-slot' data-day='"+d+"' data-slot='"+si+"'></div></td>").join('');
      tb.appendChild(tr);
    }
  });
  document.querySelectorAll('.time-slot').forEach(el=>{
    el.addEventListener('click',()=>toggleSlot(el));
    el.addEventListener('mousedown',e=>startDrag(e,el));
    el.addEventListener('mouseenter',()=>continueDrag(el));
  });
  document.addEventListener('mouseup',endDrag);
}
function toggleSlot(el){
  if(el.classList.contains('scheduled')){
    el.classList.remove('scheduled');
  }else if(el.classList.contains('available')){
    el.classList.remove('available');
    el.classList.add('scheduled');
  }else{
    el.classList.add('available');
  }
}
function startDrag(e,el){
  e.preventDefault();
  isDragging=true;
  draggedSlots.clear();
  if(el.classList.contains('scheduled')){
    dragMode='clear';
  }else if(el.classList.contains('available')){
    dragMode='scheduled';
  }else{
    dragMode='available';
  }
  const id=el.dataset.day+"-"+el.dataset.slot;
  draggedSlots.add(id);
  el.classList.add('selecting');
}
function continueDrag(el){
  if(!isDragging)return;
  const id=el.dataset.day+"-"+el.dataset.slot;
  if(!draggedSlots.has(id)){
    draggedSlots.add(id);
    el.classList.add('selecting');
  }
}
function endDrag(){
  if(!isDragging)return;
  isDragging=false;
  draggedSlots.forEach(id=>{
    const[d,s]=id.split('-');
    const el=document.querySelector(".time-slot[data-day='"+d+"'][data-slot='"+s+"']");
    if(el){
      el.classList.remove('selecting','deselecting');
      el.classList.remove('available','scheduled');
      if(dragMode==='available'){
        el.classList.add('available');
      }else if(dragMode==='scheduled'){
        el.classList.add('scheduled');
      }
    }
  });
  draggedSlots.clear();
}
function selectDay(d,status){
  document.querySelectorAll(".time-slot[data-day='"+d+"']").forEach(el=>{
    el.classList.remove('available','scheduled');
    el.classList.add(status);
  });
}
function deselectDay(d){
  document.querySelectorAll(".time-slot[data-day='"+d+"']").forEach(el=>{
    el.classList.remove('available','scheduled');
  });
}
function clearWeek(){
  if(confirm('确定清空本周？'))document.querySelectorAll('.time-slot').forEach(el=>el.classList.remove('available','scheduled'));
}
function copyFromLastWeek(){
  const keys=Object.keys(lastWeekSlots);
  if(keys.length===0){
    showToast('上周没有排课记录',true);
    return;
  }
  if(!confirm('确定复制上周的排课时间到本周？\n（会覆盖本周已有的选择）'))return;
  document.querySelectorAll('.time-slot').forEach(el=>{
    el.classList.remove('available','scheduled');
  });
  keys.forEach(key=>{
    const[d,s]=key.split('-');
    const el=document.querySelector(".time-slot[data-day='"+d+"'][data-slot='"+s+"']");
    if(el){
      const status=lastWeekSlots[key];
      if(status==='已排课'){
        el.classList.add('scheduled');
      }else{
        el.classList.add('available');
      }
    }
  });
  showToast('已复制上周排课时间！');
}
</script>
</body>
</html>
